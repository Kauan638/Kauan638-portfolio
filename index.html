<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kauan638 — Repositórios</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

*{ margin:0; padding:0; box-sizing:border-box; }

:root{
    --bg:#14181C;
    --surface:#1D2329;
    --surface-2:#232A31;
    --border:#2A323B;
    --border-light:#38424D;
    --text:#E7ECF1;
    --muted:#8B97A3;
    --amber:#F2A93B;
    --green:#3DCB82;
    --red:#E8564F;
    --blue:#4C8FD1;
}

body{
    background:radial-gradient(ellipse at top, #1A2027 0%, var(--bg) 55%);
    background-attachment:fixed;
    color:var(--text);
    font-family:'Inter',sans-serif;
    padding:50px 25px;
}

.container{
    max-width:960px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:10px;
}

h1{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:2rem;
    letter-spacing:.04em;
    text-transform:uppercase;
}

header p{
    margin-top:10px;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:.85rem;
}

header p a{
    color:var(--blue);
    text-decoration:none;
}

header p a:hover{ text-decoration:underline; }

.faixa{
    width:220px;
    height:5px;
    margin:18px auto 30px;
    border-radius:2px;
    background:repeating-linear-gradient(135deg,var(--amber) 0px,var(--amber) 10px,var(--bg) 10px,var(--bg) 20px);
    opacity:.85;
}

/* =========================
   BARRA DE ATUALIZAÇÃO
   ========================= */

.status-bar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:40px;
    font-family:'JetBrains Mono',monospace;
    font-size:.78rem;
    color:var(--muted);
}

.status-bar .pulso{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--green);
    display:inline-block;
    box-shadow:0 0 0 0 rgba(61,203,130,.6);
    animation:pulsar 2s infinite;
}

@keyframes pulsar{
    0%{ box-shadow:0 0 0 0 rgba(61,203,130,.55); }
    70%{ box-shadow:0 0 0 8px rgba(61,203,130,0); }
    100%{ box-shadow:0 0 0 0 rgba(61,203,130,0); }
}

.status-bar button{
    background:var(--surface);
    border:1px solid var(--border-light);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:.75rem;
    font-weight:600;
    letter-spacing:.03em;
    padding:7px 14px;
    border-radius:20px;
    cursor:pointer;
    transition:.2s;
}

.status-bar button:hover{
    border-color:var(--amber);
    color:var(--amber);
}

.status-bar button:disabled{
    opacity:.5;
    cursor:default;
}

/* =========================
   SEÇÕES / CATEGORIAS
   ========================= */

.secao{
    margin-bottom:40px;
}

.secao-titulo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:1.05rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--text);
}

.secao-titulo .icone{
    width:26px;
    height:26px;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:.9rem;
    flex-shrink:0;
}

.secao-titulo .contagem{
    margin-left:auto;
    font-family:'JetBrains Mono',monospace;
    font-size:.7rem;
    font-weight:600;
    letter-spacing:.03em;
    color:var(--muted);
    text-transform:none;
}

.secao--relatorios .secao-titulo .icone{
    background:rgba(76,143,209,.15);
    color:var(--blue);
    border:1px solid var(--blue);
}

.secao--operacao .secao-titulo .icone{
    background:rgba(61,203,130,.15);
    color:var(--green);
    border:1px solid var(--green);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
}

.card{
    background:var(--surface);
    border:1px solid var(--border);
    border-left:4px solid var(--blue);
    border-radius:6px;
    padding:22px;
    text-decoration:none;
    color:var(--text);
    display:block;
    transition:.2s;
}

.secao--operacao .card{
    border-left-color:var(--green);
}

.card:hover{
    transform:translateY(-3px);
    border-left-color:var(--amber);
    box-shadow:0 10px 24px rgba(0,0,0,.35);
}

.card h2{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:1.05rem;
    letter-spacing:.02em;
    margin-bottom:8px;
    word-break:break-word;
}

.card p{
    font-size:.85rem;
    color:var(--muted);
    line-height:1.4;
    margin-bottom:16px;
    min-height:38px;
}

.meta{
    display:flex;
    align-items:center;
    gap:14px;
    font-size:.72rem;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    text-transform:uppercase;
    letter-spacing:.04em;
}

.dot{
    width:9px;
    height:9px;
    border-radius:50%;
    display:inline-block;
    margin-right:5px;
    background:var(--muted);
}

.dot.lang-javascript{ background:#F2CB4B; }
.dot.lang-html{ background:var(--red); }
.dot.lang-css{ background:var(--blue); }
.dot.lang-typescript{ background:var(--blue); }
.dot.lang-python{ background:var(--green); }

.meta .atualizado.recente{
    color:var(--green);
}

.meta .atualizado.aviso{
    color:var(--amber);
}

.card.carregando p,
.card.carregando .meta{
    opacity:.45;
}

footer{
    text-align:center;
    margin-top:45px;
}

footer a{
    display:inline-block;
    padding:12px 24px;
    border:1px solid var(--amber);
    color:var(--amber);
    border-radius:6px;
    text-decoration:none;
    font-weight:700;
    font-size:.82rem;
    letter-spacing:.05em;
    text-transform:uppercase;
    transition:.2s;
}

footer a:hover{
    background:var(--amber);
    color:#241A05;
}

@media(max-width:640px){
    body{ padding:30px 16px; }
    .status-bar{ flex-direction:column; gap:10px; }
}

</style>
</head>
<body>

<div class="container">

    <header>
        <h1>Kauan638 — Repositórios</h1>
        <p>github.com/<a href="https://github.com/Kauan638" target="_blank">Kauan638</a></p>
        <div class="faixa"></div>
    </header>

    <div class="status-bar">
        <span><span class="pulso"></span> &nbsp;Sincronizado com o GitHub · <span id="horaAtualizacao">carregando…</span></span>
        <button id="btnAtualizar" onclick="carregarTudo(true)">🔄 Atualizar agora</button>
    </div>

    <div class="secao secao--relatorios">
        <div class="secao-titulo">
            <span class="icone">📊</span>
            Relatórios
            <span class="contagem" id="contagemRelatorios"></span>
        </div>
        <div class="grid" id="gridRelatorios"></div>
    </div>

    <div class="secao secao--operacao">
        <div class="secao-titulo">
            <span class="icone">⚙️</span>
            Operação
            <span class="contagem" id="contagemOperacao"></span>
        </div>
        <div class="grid" id="gridOperacao"></div>
    </div>

    <footer>
        <a href="https://github.com/Kauan638?tab=repositories" target="_blank">Ver todos no GitHub →</a>
    </footer>

</div>

<script>

// =====================================================
// FERRAMENTAS
// Pra adicionar uma nova, é só incluir um objeto aqui —
// o resto (categoria, linguagem, data de atualização)
// é resolvido automaticamente via API do GitHub.
// categoria: "relatorios" ou "operacao"
// =====================================================

const FERRAMENTAS = [

    // ---------- RELATÓRIOS ----------

    {
        nome: "Acompanhamento de Pedidos",
        descricao: "Distribuição por pavilhão — valor (R$) e volume, por dia",
        url: "https://kauan638.github.io/Acompanhamento-de-pedidos/",
        categoria: "relatorios"
    },
    {
        nome: "Pendência PTL",
        descricao: "Detalhamento por PTL → SKU → DESCRIÇÃO",
        url: "https://kauan638.github.io/Pend-ncia-PTL/",
        categoria: "relatorios"
    },
    {
        nome: "Relatório de Rejeito Geral",
        descricao: "Consultar Rejeitos e Relatório de Estações de Leitura",
        url: "https://kauan638.github.io/Rejeito-Geral/",
        categoria: "relatorios"
    },
    {
        nome: "Apontamento de Atividades",
        descricao: "Movimentação Horizontal/Vertical e Separação",
        url: "https://kauan638.github.io/Apontamento-de-Atividades/",
        categoria: "relatorios"
    },
    {
        nome: "Relatório de Expedição",
        descricao: "Turno B e Faturamento — resumo executivo",
        url: "https://kauan638.github.io/Relat-rio-Expedi-o-/",
        categoria: "relatorios"
    },

    // ---------- OPERAÇÃO ----------

    {
        nome: "Análise de Pedidos Antigos",
        descricao: "Cruzamento de pedidos antigos, Masters e status de etiqueta",
        url: "https://kauan638.github.io/An-lise-de-pedidos-antigos/",
        categoria: "operacao"
    },
    {
        nome: "Comparativo de Estoque",
        descricao: "WMS (Locus) x Comercial, com impacto financeiro",
        url: "https://kauan638.github.io/Comparativo-de-estoque-/",
        categoria: "operacao"
    },
    {
        nome: "Gerador de Abastecimento",
        descricao: "Gerar abastecimento conforme a necessidade dos pedidos gerados",
        url: "https://kauan638.github.io/Gerador-de-abastecimento-/",
        categoria: "operacao"
    },
    {
        nome: "CD-107 Map View",
        descricao: "Mapa de armazenagem",
        url: "https://kauan638.github.io/CD-107-MAP-VIEW-/",
        categoria: "operacao"
    }

];

const USUARIO_GITHUB = "Kauan638";

const INTERVALO_AUTO_ATUALIZACAO_MS = 5 * 60 * 1000; // 5 minutos

// extrai o nome do repositório a partir da URL do
// GitHub Pages (https://usuario.github.io/NOME-DO-REPO/)

function extrairNomeRepo(url){

    try{

        const partes =
        new URL(url).pathname.split("/").filter(Boolean);

        return partes[0] || null;

    }
    catch(erro){

        console.error("URL inválida:", url, erro);

        return null;

    }

}

// formata a diferença entre agora e a data informada
// em texto relativo ("agora", "há 5 min", "há 3 dias"...)

function formatarTempoRelativo(isoData){

    if(!isoData){
        return "sem dados";
    }

    const agora = new Date();

    const data = new Date(isoData);

    const diffMs = agora - data;

    const diffMin = Math.floor(diffMs / 60000);

    if(diffMin < 1){
        return "atualizado agora";
    }

    if(diffMin < 60){
        return `atualizado há ${diffMin} min`;
    }

    const diffHoras = Math.floor(diffMin / 60);

    if(diffHoras < 24){
        return `atualizado há ${diffHoras}h`;
    }

    const diffDias = Math.floor(diffHoras / 24);

    if(diffDias === 1){
        return "atualizado ontem";
    }

    if(diffDias < 7){
        return `atualizado há ${diffDias} dias`;
    }

    const diffSemanas = Math.floor(diffDias / 7);

    if(diffSemanas === 1){
        return "atualizado semana passada";
    }

    if(diffSemanas < 5){
        return `atualizado há ${diffSemanas} semanas`;
    }

    const diffMeses = Math.floor(diffDias / 30);

    return `atualizado há ${diffMeses} ${diffMeses === 1 ? "mês" : "meses"}`;

}

function ehRecente(isoData){

    if(!isoData){
        return false;
    }

    const diffHoras =
    (new Date() - new Date(isoData)) / 3600000;

    return diffHoras < 24;

}

// monta o HTML de um card (com ou sem dados carregados)
// dados === null      -> ainda carregando (esqueleto)
// dados === undefined -> repo não encontrado na resposta da API
// dados === "erro"    -> falha na API (rate limit / rede)
// dados === {...}     -> dados normais

function montarCardHtml(ferramenta, dados){

    const repo = extrairNomeRepo(ferramenta.url);

    const carregando = dados === null;

    const comErro = dados === "erro";

    const naoEncontrado = dados === undefined;

    const linguagem =
    (dados && typeof dados === "object" && dados.language)
    ? dados.language.toLowerCase()
    : "";

    let textoTempo = "sem dados";

    if(carregando){
        textoTempo = "carregando…";
    }
    else if(comErro){
        textoTempo = "limite da API atingido";
    }
    else if(naoEncontrado){
        textoTempo = "repositório não encontrado";
    }
    else{
        textoTempo = formatarTempoRelativo(dados?.pushed_at);
    }

    const classeRecente =
    !carregando && !comErro && !naoEncontrado && ehRecente(dados?.pushed_at)
    ? "recente"
    : (comErro || naoEncontrado ? "aviso" : "");

    const rotuloLinguagem =
    (dados && typeof dados === "object" && dados.language)
    ? dados.language
    : "—";

    return `
    <a class="card ${carregando ? "carregando" : ""}"
       href="${ferramenta.url}"
       target="_blank"
       data-repo="${repo || ""}">

        <h2>${ferramenta.nome}</h2>

        <p>${ferramenta.descricao}</p>

        <div class="meta">
            <span>
                <span class="dot ${linguagem ? "lang-" + linguagem : ""}"></span>${rotuloLinguagem}
            </span>
            <span class="atualizado ${classeRecente}">${textoTempo}</span>
        </div>

    </a>
    `;

}

function renderizarEsqueleto(){

    const relatorios =
    FERRAMENTAS.filter(f => f.categoria === "relatorios");

    const operacao =
    FERRAMENTAS.filter(f => f.categoria === "operacao");

    document.getElementById("gridRelatorios").innerHTML =
    relatorios.map(f => montarCardHtml(f, null)).join("");

    document.getElementById("gridOperacao").innerHTML =
    operacao.map(f => montarCardHtml(f, null)).join("");

    document.getElementById("contagemRelatorios").innerText =
    `${relatorios.length} ferramenta${relatorios.length === 1 ? "" : "s"}`;

    document.getElementById("contagemOperacao").innerText =
    `${operacao.length} ferramenta${operacao.length === 1 ? "" : "s"}`;

}

// busca TODOS os repositórios do usuário numa única
// chamada à API (em vez de uma chamada por ferramenta),
// pra economizar o limite de requisições do GitHub
// (60/hora por IP sem login).

async function buscarTodosOsRepos(){

    try{

        const resposta = await fetch(
            `https://api.github.com/users/${USUARIO_GITHUB}/repos?per_page=100`
        );

        if(!resposta.ok){

            console.warn(
                `API do GitHub respondeu ${resposta.status} ao listar repositórios.`
            );

            return { erro: resposta.status };

        }

        const lista = await resposta.json();

        const mapaPorNome = {};

        lista.forEach(repo => {

            mapaPorNome[repo.name] = {
                pushed_at: repo.pushed_at,
                language: repo.language
            };

        });

        return { mapaPorNome };

    }
    catch(erro){

        console.error("Erro ao buscar repositórios:", erro);

        return { erro: "rede" };

    }

}

async function carregarTudo(forcadoPeloUsuario){

    const botao = document.getElementById("btnAtualizar");

    if(forcadoPeloUsuario && botao){

        botao.disabled = true;

        botao.innerText = "🔄 Atualizando…";

    }

    renderizarEsqueleto();

    const { mapaPorNome, erro } = await buscarTodosOsRepos();

    const resultados =
    FERRAMENTAS.map(ferramenta => {

        const repo = extrairNomeRepo(ferramenta.url);

        let dados;

        if(erro){

            dados = "erro";

        }
        else if(!repo || !mapaPorNome[repo]){

            dados = undefined;

        }
        else{

            dados = mapaPorNome[repo];

        }

        return { ferramenta, dados };

    });

    const relatorios =
    resultados.filter(r => r.ferramenta.categoria === "relatorios");

    const operacao =
    resultados.filter(r => r.ferramenta.categoria === "operacao");

    document.getElementById("gridRelatorios").innerHTML =
    relatorios.map(r => montarCardHtml(r.ferramenta, r.dados)).join("");

    document.getElementById("gridOperacao").innerHTML =
    operacao.map(r => montarCardHtml(r.ferramenta, r.dados)).join("");

    document.getElementById("horaAtualizacao").innerText =
    erro
    ? `falha (${erro === "rede" ? "sem conexão" : "limite da API atingido"})`
    : new Date().toLocaleTimeString("pt-BR");

    if(botao){

        // cooldown de 10s pra evitar cliques repetidos
        // que estourem o limite de requisições

        setTimeout(() => {

            botao.disabled = false;

            botao.innerText = "🔄 Atualizar agora";

        }, 10000);

    }

}

window.addEventListener("load", () => {

    carregarTudo(false);

    setInterval(() => carregarTudo(false), INTERVALO_AUTO_ATUALIZACAO_MS);

});

</script>

</body>
</html>
